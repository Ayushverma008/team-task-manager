<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow – Project</title>
  <meta name="description" content="Manage your project tasks with TaskFlow's Kanban board."/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
  <div id="toast-container" class="toast-container"></div>

  <!-- Navbar -->
  <nav class="navbar">
    <div style="display:flex;align-items:center;gap:14px">
      <a href="dashboard.html" class="btn btn-ghost btn-icon" title="Back to Dashboard">
        <i class="fa fa-arrow-left"></i>
      </a>
      <span class="navbar-brand"><i class="fa-solid fa-bolt-lightning"></i> TaskFlow</span>
      <span id="nav-project-title" style="color:var(--text-muted);font-size:0.85rem"></span>
    </div>
    <div class="navbar-actions">
      <span id="nav-role-badge" class="project-role-badge"></span>
      <span id="nav-username" style="font-size:0.85rem;color:var(--text-secondary)"></span>
      <div class="avatar" id="nav-avatar"></div>
      <button class="btn btn-ghost btn-sm" onclick="logout()"><i class="fa fa-right-from-bracket"></i> Logout</button>
    </div>
  </nav>

  <!-- Body -->
  <div style="padding:24px;max-width:1400px;margin:0 auto">
    <div class="section-header" style="margin-bottom:24px">
      <div>
        <h1 class="section-title" id="project-title-heading">Loading...</h1>
        <p class="section-subtitle" id="project-desc-heading"></p>
      </div>
      <div style="display:flex;gap:10px" id="admin-actions">
        <button class="btn btn-danger" onclick="handleDeleteProject()" id="delete-project-btn">
          <i class="fa fa-trash-can"></i> Delete Project
        </button>
        <button class="btn btn-primary" onclick="openCreateTaskModal()" id="create-task-btn">
          <i class="fa fa-plus"></i> Add Task
        </button>
      </div>
    </div>

    <div class="project-page-layout">
      <!-- Kanban Board -->
      <div>
        <div class="kanban-board" id="kanban-board">
          <!-- Todo Column -->
          <div class="kanban-col col-todo" id="col-Todo" ondragover="onDragOver(event)" ondrop="onDrop(event,'Todo')">
            <div class="kanban-col-header">
              <span><i class="fa fa-circle-dot" style="color:#64748b;margin-right:6px"></i> To Do</span>
              <span class="col-count" id="count-Todo">0</span>
            </div>
            <div class="kanban-tasks" id="tasks-Todo"></div>
          </div>
          <!-- In Progress Column -->
          <div class="kanban-col col-inprogress" id="col-InProgress" ondragover="onDragOver(event)" ondrop="onDrop(event,'InProgress')">
            <div class="kanban-col-header">
              <span><i class="fa fa-spinner" style="color:#3b82f6;margin-right:6px"></i> In Progress</span>
              <span class="col-count" id="count-InProgress">0</span>
            </div>
            <div class="kanban-tasks" id="tasks-InProgress"></div>
          </div>
          <!-- Done Column -->
          <div class="kanban-col col-done" id="col-Done" ondragover="onDragOver(event)" ondrop="onDrop(event,'Done')">
            <div class="kanban-col-header">
              <span><i class="fa fa-circle-check" style="color:#10b981;margin-right:6px"></i> Done</span>
              <span class="col-count" id="count-Done">0</span>
            </div>
            <div class="kanban-tasks" id="tasks-Done"></div>
          </div>
        </div>
      </div>

      <!-- Members Panel -->
      <div class="members-panel">
        <div class="members-panel-title">
          <i class="fa fa-users" style="color:var(--accent-light)"></i> Team Members
          <button id="add-member-btn" class="btn btn-ghost btn-sm btn-icon" onclick="openAddMemberModal()" title="Add Member" style="margin-left:auto">
            <i class="fa fa-user-plus"></i>
          </button>
        </div>
        <div id="members-list">
          <div class="spinner" style="width:24px;height:24px;margin:16px auto;border-width:2px;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- CREATE TASK MODAL -->
  <div id="create-task-modal" class="modal-overlay hidden" onclick="closeModalOnBg(event,'create-task-modal')">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="task-modal-title"><i class="fa fa-square-plus" style="color:var(--accent-light)"></i> New Task</span>
        <button class="btn btn-ghost btn-icon" onclick="closeModal('create-task-modal')"><i class="fa fa-xmark"></i></button>
      </div>
      <form class="modal-form" onsubmit="handleSaveTask(event)">
        <input type="hidden" id="task-edit-id"/>
        <div class="form-group">
          <label class="form-label">Title *</label>
          <input type="text" id="task-title" class="form-input" placeholder="Task title" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea id="task-desc" class="form-textarea" placeholder="Describe the task..."></textarea>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label class="form-label">Priority</label>
            <select id="task-priority" class="form-select">
              <option value="Low">Low</option>
              <option value="Medium" selected>Medium</option>
              <option value="High">High</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Due Date</label>
            <input type="date" id="task-due" class="form-input"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Assign To</label>
          <select id="task-assignee" class="form-select">
            <option value="">Unassigned</option>
          </select>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" onclick="closeModal('create-task-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary" id="save-task-btn">
            <i class="fa fa-floppy-disk"></i> Save Task
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ADD MEMBER MODAL -->
  <div id="add-member-modal" class="modal-overlay hidden" onclick="closeModalOnBg(event,'add-member-modal')">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title"><i class="fa fa-user-plus" style="color:var(--accent-light)"></i> Add Member</span>
        <button class="btn btn-ghost btn-icon" onclick="closeModal('add-member-modal')"><i class="fa fa-xmark"></i></button>
      </div>
      <form class="modal-form" onsubmit="handleAddMember(event)">
        <div class="form-group">
          <label class="form-label">Member Email *</label>
          <input type="email" id="member-email" class="form-input" placeholder="member@example.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select id="member-role" class="form-select">
            <option value="Member">Member</option>
            <option value="Admin">Admin</option>
          </select>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" onclick="closeModal('add-member-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary" id="add-member-btn-submit">
            <i class="fa fa-plus"></i> Add Member
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- EDIT MEMBER MODAL -->
  <div id="edit-member-modal" class="modal-overlay hidden" onclick="closeModalOnBg(event,'edit-member-modal')">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title"><i class="fa fa-user-pen" style="color:var(--accent-light)"></i> Edit Team Member</span>
        <button class="btn btn-ghost btn-icon" onclick="closeModal('edit-member-modal')"><i class="fa fa-xmark"></i></button>
      </div>
      <form class="modal-form" onsubmit="handleUpdateMember(event)">
        <input type="hidden" id="edit-member-id"/>
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" id="edit-member-name" class="form-input" placeholder="Name"/>
        </div>
        <div class="form-group">
          <label class="form-label">Project Role</label>
          <select id="edit-member-role" class="form-select">
            <option value="Member">Member</option>
            <option value="Admin">Admin</option>
          </select>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" onclick="closeModal('edit-member-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary" id="edit-member-btn-submit">
            <i class="fa fa-floppy-disk"></i> Update Member
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/project.js"></script>
</body>
</html>
