<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow – Dashboard</title>
  <meta name="description" content="Your TaskFlow dashboard – view all projects and task statistics."/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
  <div id="toast-container" class="toast-container"></div>

  <div class="dashboard-layout">
    <!-- Navbar -->
    <nav class="navbar">
      <span class="navbar-brand"><i class="fa-solid fa-bolt-lightning"></i> TaskFlow</span>
      <div class="navbar-actions">
        <span id="nav-username" style="font-size:0.85rem;color:var(--text-secondary)"></span>
        <div class="avatar" id="nav-avatar" title="Account"></div>
        <button class="btn btn-ghost btn-sm" onclick="logout()">
          <i class="fa fa-right-from-bracket"></i> Logout
        </button>
      </div>
    </nav>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Overview</div>
        <button class="sidebar-item active" onclick="showView('overview')">
          <span class="item-icon"><i class="fa fa-house"></i></span> Dashboard
        </button>
        <button class="sidebar-item" onclick="showView('allTasks')">
          <span class="item-icon"><i class="fa fa-list-check"></i></span> All Tasks
        </button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">Projects</div>
        <div id="sidebar-projects">
          <div class="spinner" style="width:24px;height:24px;margin:12px auto;border-width:2px;"></div>
        </div>
        <button class="sidebar-item" id="new-project-btn" onclick="openCreateProjectModal()" style="margin-top:8px;color:var(--accent-light)">
          <span class="item-icon"><i class="fa fa-plus"></i></span> New Project
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Overview View -->
      <div id="view-overview">
        <div class="section-header">
          <div>
            <h1 class="section-title">Dashboard</h1>
            <p class="section-subtitle">Your task overview across all projects</p>
          </div>
          <button class="btn btn-primary" onclick="openCreateProjectModal()">
            <i class="fa fa-plus"></i> New Project
          </button>
        </div>

        <!-- Stats -->
        <div class="stats-grid" id="stats-grid">
          <div class="stat-card total">
            <div class="stat-label">Total Tasks</div>
            <div class="stat-value" id="stat-total">–</div>
          </div>
          <div class="stat-card todo">
            <div class="stat-label">To Do</div>
            <div class="stat-value" id="stat-todo">–</div>
          </div>
          <div class="stat-card inprogress">
            <div class="stat-label">In Progress</div>
            <div class="stat-value" id="stat-inprogress">–</div>
          </div>
          <div class="stat-card done">
            <div class="stat-label">Done</div>
            <div class="stat-value" id="stat-done">–</div>
          </div>
          <div class="stat-card overdue">
            <div class="stat-label">Overdue</div>
            <div class="stat-value" id="stat-overdue">–</div>
          </div>
        </div>

        <!-- Charts and Projects -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px" id="charts-row">
          <!-- Status Distribution Chart -->
          <div class="card">
            <div style="font-size:0.88rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;">
              <i class="fa fa-chart-pie" style="color:var(--accent-light)"></i> Status Distribution
            </div>
            <canvas id="status-chart" height="140"></canvas>
          </div>
          <!-- Per-User Chart -->
          <div class="card">
            <div style="font-size:0.88rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;">
              <i class="fa fa-users" style="color:var(--accent-light)"></i> Tasks per Member
            </div>
            <canvas id="user-chart" height="140"></canvas>
          </div>
        </div>

        <!-- Projects Grid -->
        <div class="section-header">
          <h2 style="font-size:1rem;font-weight:700">Your Projects</h2>
        </div>
        <div class="projects-grid" id="projects-grid">
          <div class="spinner"></div>
        </div>
      </div>

      <!-- All Tasks View -->
      <div id="view-allTasks" class="hidden">
        <div class="section-header">
          <div>
            <h1 class="section-title">All Tasks</h1>
            <p class="section-subtitle">Tasks assigned to you across all projects</p>
          </div>
        </div>
        <div id="all-tasks-list"></div>
      </div>
    </main>
  </div>

  <!-- Create Project Modal -->
  <div id="create-project-modal" class="modal-overlay hidden" onclick="closeModalOnBg(event,'create-project-modal')">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title"><i class="fa fa-folder-plus" style="color:var(--accent-light)"></i> New Project</span>
        <button class="btn btn-ghost btn-icon" onclick="closeModal('create-project-modal')"><i class="fa fa-xmark"></i></button>
      </div>
      <form class="modal-form" onsubmit="handleCreateProject(event)">
        <div class="form-group">
          <label class="form-label">Project Title *</label>
          <input type="text" id="proj-title" class="form-input" placeholder="e.g. Website Redesign" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea id="proj-desc" class="form-textarea" placeholder="What is this project about?"></textarea>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" onclick="closeModal('create-project-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary" id="create-proj-btn">
            <i class="fa fa-plus"></i> Create Project
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
